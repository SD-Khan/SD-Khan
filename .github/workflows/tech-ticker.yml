name: Generate Tech Ticker

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"   # daily

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pillow cairosvg

      - name: Generate ticker GIF
        run: |
          python tools/generate_tech_ticker.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/tech-ticker.gif tools/.cache/icons || true
          git commit -m "chore: update tech ticker" || echo "No changes to commit"
          git push